<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake</title>
    <!-- Classic 8-bit Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>SNAKE GAME</h1>
        </header>

        <main>
            <div class="screen-bezel">
                <div class="score-board">
                    <div class="score-card">
                        <span class="label">SCORE</span>
                        <span id="score" class="value">0</span>
                    </div>
                    <div class="score-card">
                        <span class="label">HI-SCORE</span>
                        <span id="high-score" class="value">0</span>
                    </div>
                </div>
                <!-- continue directly into the rest -->
            <div class="canvas-wrapper">
                <canvas id="game-canvas" width="400" height="400"></canvas>
                
                <div id="game-overlay" class="overlay">
                    <div class="overlay-content">
                        <h2 id="overlay-title">READY</h2>
                        <p id="overlay-message">PRESS <span class="key">SPACE</span> TO START</p>
                        <p class="controls-hint">USE <span class="key">ARROWS</span> OR <span class="key">WASD</span></p>
                        <button id="start-btn" class="btn">START</button>
                    </div>
                </div>
            </div> <!-- End Screen Bezel -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
